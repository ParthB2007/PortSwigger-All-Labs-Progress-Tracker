name: Auto Progress

on:
  push:
    paths:
      - "README.md"

jobs:
  progress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Calculate Progress
        run: |
          total=$(grep -o "\- \[[ x]\]" README.md | wc -l)
          solved=$(grep -o "\- \[x\]" README.md | wc -l)

          percent=$(awk "BEGIN {printf \"%.0f\", ($solved/$total)*100}")

          filled=$((percent / 5))
          empty=$((20 - filled))

          bar=$(printf "%0.sâ–ˆ" $(seq 1 $filled))
          space=$(printf "%0.sâ–‘" $(seq 1 $empty))

          output="Solved: $solved / $total  \nCompletion: $percent% \n\n$bar$space"

          sed -i "/PROGRESS_START/,/PROGRESS_END/c\\<!-- PROGRESS_START -->\n$output\n<!-- PROGRESS_END -->" README.md

      - name: Commit changes
        run: |
          git config --global user.name "progress-bot"
          git config --global user.email "bot@github.com"
          git add README.md
          git commit -m "auto progress update" || echo "No changes"
          git push
