name: Checklist Progress Badge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checklist-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checklist Progress Badge
        uses: dodopizza/gha-checklist-badges@v0.1
        with:
          readme-filename: README.md
          github_token: ${{ secrets.GITHUB_TOKEN }}
