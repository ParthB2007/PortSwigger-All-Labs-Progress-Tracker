name: Auto Progress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  progress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Calculate progress
        id: calc
        run: |
          make_bar () {
            percent=$1
            filled=$((percent / 5))
            empty=$((20 - filled))
            bar=$(printf "%0.s█" $(seq 1 $filled))
            space=$(printf "%0.s░" $(seq 1 $empty))
            echo "$bar$space"
          }

          total=$(grep -c "^- \[[ x]\]" README.md)
          done=$(grep -c "^- \[x\]" README.md)

          if [ "$total" -eq 0 ]; then
            percent=0
          else
            percent=$((done * 100 / total))
          fi

          bar=$(make_bar $percent)

          echo "BAR=$bar" >> $GITHUB_OUTPUT
          echo "DONE=$done" >> $GITHUB_OUTPUT
          echo "TOTAL=$total" >> $GITHUB_OUTPUT
          echo "PERCENT=$percent" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          awk \
          -v bar="${{ steps.calc.outputs.BAR }}" \
          -v done="${{ steps.calc.outputs.DONE }}" \
          -v total="${{ steps.calc.outputs.TOTAL }}" \
          -v percent="${{ steps.calc.outputs.PERCENT }}" '

          /^## 📊 Progress/ {
            print
            getline
            print bar
            print done "/" total " (" percent "%)"
            next
          }

          {print}

          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update progress" || echo "no change"
          git push
