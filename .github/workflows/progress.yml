name: Auto Progress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  progress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Calculate progress
        id: calc
        run: |

          make_bar () {
            percent=$1
            filled=$((percent / 5))
            empty=$((20 - filled))
            bar=$(printf "%0.s█" $(seq 1 $filled))
            space=$(printf "%0.s░" $(seq 1 $empty))
            echo "$bar$space"
          }

          calc_section () {
            header="$1"

            section=$(awk "/## $header/,/^## /" README.md)

            total=$(echo "$section" | grep -o "\- \[[ x]\]" | wc -l)
            done=$(echo "$section" | grep -o "\- \[x\]" | wc -l)

            if [ "$total" -eq 0 ]; then
              percent=0
            else
              percent=$((done * 100 / total))
            fi

            bar=$(make_bar $percent)

            echo "$done|$total|$percent|$bar"
          }

          # overall
          total=$(grep -o "\- \[[ x]\]" README.md | wc -l)
          done=$(grep -o "\- \[x\]" README.md | wc -l)

          percent=$((done * 100 / total))
          bar=$(make_bar $percent)

          echo "OVERALL=$done|$total|$percent|$bar" >> $GITHUB_OUTPUT

          echo "SQL=$(calc_section "SQL injection")" >> $GITHUB_OUTPUT
          echo "XSS=$(calc_section "Cross-site scripting")" >> $GITHUB_OUTPUT
          echo "CSRF=$(calc_section "Cross-site request forgery")" >> $GITHUB_OUTPUT
          echo "SSRF=$(calc_section "Server-side request forgery")" >> $GITHUB_OUTPUT
          echo "NOSQL=$(calc_section "NoSQL injection")" >> $GITHUB_OUTPUT

      - name: Update README
        run: |

          overall="${{ steps.calc.outputs.OVERALL }}"

          awk -v overall="$overall" '

          function block(data){
            split(data,a,"|")
            print a[4]
            print a[1] "/" a[2] " (" a[3] "%)"
            print ""
          }

          /## Overall Progress/ {
            print
            block(overall)
            next
          }

          {print}

          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update progress" || echo "no change"
          git push
