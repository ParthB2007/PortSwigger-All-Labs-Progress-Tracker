name: Auto Progress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  progress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Calculate progress
        id: calc
        run: |

          make_bar () {
            percent=$1
            filled=$((percent / 5))
            empty=$((20 - filled))
            bar=$(printf "%0.s█" $(seq 1 $filled))
            space=$(printf "%0.s░" $(seq 1 $empty))
            echo "$bar$space"
          }

          calc_section () {
            start=$1
            end=$2

            section=$(awk "/$start/,/$end/" README.md | grep "^- \[")

            total=$(echo "$section" | grep -o "\- \[[ x]\]" | wc -l)
            done=$(echo "$section" | grep -o "\- \[x\]" | wc -l)

            if [ "$total" -eq 0 ]; then percent=0
            else percent=$((done * 100 / total)); fi

            bar=$(make_bar $percent)
            echo "$done|$total|$percent|$bar"
          }

          total=$(grep -c "^- \[" README.md)
          done=$(grep -c "^- \[x\]" README.md)
          percent=$((done * 100 / total))
          bar=$(make_bar $percent)

          echo "OVERALL=$done|$total|$percent|$bar" >> $GITHUB_OUTPUT

          echo "SQL=$(calc_section '<!-- SQL_START -->' '<!-- SQL_END -->')" >> $GITHUB_OUTPUT
          echo "XSS=$(calc_section '<!-- XSS_START -->' '<!-- XSS_END -->')" >> $GITHUB_OUTPUT
          echo "CSRF=$(calc_section '<!-- CSRF_START -->' '<!-- CSRF_END -->')" >> $GITHUB_OUTPUT
          echo "CLICKJACK=$(calc_section '<!-- CLICKJACK_START -->' '<!-- CLICKJACK_END -->')" >> $GITHUB_OUTPUT
          echo "DOM=$(calc_section '<!-- DOM_START -->' '<!-- DOM_END -->')" >> $GITHUB_OUTPUT
          echo "CORS=$(calc_section '<!-- CORS_START -->' '<!-- CORS_END -->')" >> $GITHUB_OUTPUT
          echo "XXE=$(calc_section '<!-- XXE_START -->' '<!-- XXE_END -->')" >> $GITHUB_OUTPUT
          echo "SSRF=$(calc_section '<!-- SSRF_START -->' '<!-- SSRF_END -->')" >> $GITHUB_OUTPUT
          echo "SMUGGLING=$(calc_section '<!-- SMUGGLING_START -->' '<!-- SMUGGLING_END -->')" >> $GITHUB_OUTPUT
          echo "SSTI=$(calc_section '<!-- SSTI_START -->' '<!-- SSTI_END -->')" >> $GITHUB_OUTPUT
          echo "CMD=$(calc_section '<!-- CMD_START -->' '<!-- CMD_END -->')" >> $GITHUB_OUTPUT
          echo "ACCESS=$(calc_section '<!-- ACCESS_START -->' '<!-- ACCESS_END -->')" >> $GITHUB_OUTPUT
          echo "AUTH=$(calc_section '<!-- AUTH_START -->' '<!-- AUTH_END -->')" >> $GITHUB_OUTPUT
          echo "WS=$(calc_section '<!-- WS_START -->' '<!-- WS_END -->')" >> $GITHUB_OUTPUT
          echo "CACHE=$(calc_section '<!-- CACHE_START -->' '<!-- CACHE_END -->')" >> $GITHUB_OUTPUT
          echo "DESERIAL=$(calc_section '<!-- DESERIAL_START -->' '<!-- DESERIAL_END -->')" >> $GITHUB_OUTPUT
          echo "INFO=$(calc_section '<!-- INFO_START -->' '<!-- INFO_END -->')" >> $GITHUB_OUTPUT
          echo "LOGIC=$(calc_section '<!-- LOGIC_START -->' '<!-- LOGIC_END -->')" >> $GITHUB_OUTPUT
          echo "HOST=$(calc_section '<!-- HOST_START -->' '<!-- HOST_END -->')" >> $GITHUB_OUTPUT
          echo "OAUTH=$(calc_section '<!-- OAUTH_START -->' '<!-- OAUTH_END -->')" >> $GITHUB_OUTPUT
          echo "UPLOAD=$(calc_section '<!-- UPLOAD_START -->' '<!-- UPLOAD_END -->')" >> $GITHUB_OUTPUT
          echo "JWT=$(calc_section '<!-- JWT_START -->' '<!-- JWT_END -->')" >> $GITHUB_OUTPUT
          echo "SKILLS=$(calc_section '<!-- SKILLS_START -->' '<!-- SKILLS_END -->')" >> $GITHUB_OUTPUT
          echo "PROTO=$(calc_section '<!-- PROTO_START -->' '<!-- PROTO_END -->')" >> $GITHUB_OUTPUT
          echo "GRAPHQL=$(calc_section '<!-- GRAPHQL_START -->' '<!-- GRAPHQL_END -->')" >> $GITHUB_OUTPUT
          echo "RACE=$(calc_section '<!-- RACE_START -->' '<!-- RACE_END -->')" >> $GITHUB_OUTPUT
          echo "NOSQL=$(calc_section '<!-- NOSQL_START -->' '<!-- NOSQL_END -->')" >> $GITHUB_OUTPUT
          echo "API=$(calc_section '<!-- API_START -->' '<!-- API_END -->')" >> $GITHUB_OUTPUT
          echo "LLM=$(calc_section '<!-- LLM_START -->' '<!-- LLM_END -->')" >> $GITHUB_OUTPUT
          echo "CACHEDEC=$(calc_section '<!-- CACHEDEC_START -->' '<!-- CACHEDEC_END -->')" >> $GITHUB_OUTPUT

      - name: Update README
        run: |

          awk \
          -v overall="${{ steps.calc.outputs.OVERALL }}" \
          -v sql="${{ steps.calc.outputs.SQL }}" \
          -v xss="${{ steps.calc.outputs.XSS }}" \
          -v csrf="${{ steps.calc.outputs.CSRF }}" \
          -v clickjack="${{ steps.calc.outputs.CLICKJACK }}" \
          -v dom="${{ steps.calc.outputs.DOM }}" \
          -v cors="${{ steps.calc.outputs.CORS }}" \
          -v xxe="${{ steps.calc.outputs.XXE }}" \
          -v ssrf="${{ steps.calc.outputs.SSRF }}" \
          -v smuggling="${{ steps.calc.outputs.SMUGGLING }}" \
          -v ssti="${{ steps.calc.outputs.SSTI }}" \
          -v cmd="${{ steps.calc.outputs.CMD }}" \
          -v access="${{ steps.calc.outputs.ACCESS }}" \
          -v auth="${{ steps.calc.outputs.AUTH }}" \
          -v ws="${{ steps.calc.outputs.WS }}" \
          -v cache="${{ steps.calc.outputs.CACHE }}" \
          -v deserial="${{ steps.calc.outputs.DESERIAL }}" \
          -v info="${{ steps.calc.outputs.INFO }}" \
          -v logic="${{ steps.calc.outputs.LOGIC }}" \
          -v host="${{ steps.calc.outputs.HOST }}" \
          -v oauth="${{ steps.calc.outputs.OAUTH }}" \
          -v upload="${{ steps.calc.outputs.UPLOAD }}" \
          -v jwt="${{ steps.calc.outputs.JWT }}" \
          -v skills="${{ steps.calc.outputs.SKILLS }}" \
          -v proto="${{ steps.calc.outputs.PROTO }}" \
          -v graphql="${{ steps.calc.outputs.GRAPHQL }}" \
          -v race="${{ steps.calc.outputs.RACE }}" \
          -v nosql="${{ steps.calc.outputs.NOSQL }}" \
          -v api="${{ steps.calc.outputs.API }}" \
          -v llm="${{ steps.calc.outputs.LLM }}" \
          -v cachedec="${{ steps.calc.outputs.CACHEDEC }}" '

          function block(data){
            split(data,a,"|")
            return a[4] "\n" a[1] "/" a[2] " (" a[3] "%)"
          }

          /<!-- OVERALL_START -->/ { print; print block(overall); getline; getline; next }

          /<!-- SQL_PROGRESS -->/ { print; print block(sql); getline; getline; next }
          /<!-- XSS_PROGRESS -->/ { print; print block(xss); getline; getline; next }
          /<!-- CSRF_PROGRESS -->/ { print; print block(csrf); getline; getline; next }
          /<!-- CLICKJACK_PROGRESS -->/ { print; print block(clickjack); getline; getline; next }
          /<!-- DOM_PROGRESS -->/ { print; print block(dom); getline; getline; next }
          /<!-- CORS_PROGRESS -->/ { print; print block(cors); getline; getline; next }
          /<!-- XXE_PROGRESS -->/ { print; print block(xxe); getline; getline; next }
          /<!-- SSRF_PROGRESS -->/ { print; print block(ssrf); getline; getline; next }
          /<!-- SMUGGLING_PROGRESS -->/ { print; print block(smuggling); getline; getline; next }
          /<!-- SSTI_PROGRESS -->/ { print; print block(ssti); getline; getline; next }
          /<!-- CMD_PROGRESS -->/ { print; print block(cmd); getline; getline; next }
          /<!-- ACCESS_PROGRESS -->/ { print; print block(access); getline; getline; next }
          /<!-- AUTH_PROGRESS -->/ { print; print block(auth); getline; getline; next }
          /<!-- WS_PROGRESS -->/ { print; print block(ws); getline; getline; next }
          /<!-- CACHE_PROGRESS -->/ { print; print block(cache); getline; getline; next }
          /<!-- DESERIAL_PROGRESS -->/ { print; print block(deserial); getline; getline; next }
          /<!-- INFO_PROGRESS -->/ { print; print block(info); getline; getline; next }
          /<!-- LOGIC_PROGRESS -->/ { print; print block(logic); getline; getline; next }
          /<!-- HOST_PROGRESS -->/ { print; print block(host); getline; getline; next }
          /<!-- OAUTH_PROGRESS -->/ { print; print block(oauth); getline; getline; next }
          /<!-- UPLOAD_PROGRESS -->/ { print; print block(upload); getline; getline; next }
          /<!-- JWT_PROGRESS -->/ { print; print block(jwt); getline; getline; next }
          /<!-- SKILLS_PROGRESS -->/ { print; print block(skills); getline; getline; next }
          /<!-- PROTO_PROGRESS -->/ { print; print block(proto); getline; getline; next }
          /<!-- GRAPHQL_PROGRESS -->/ { print; print block(graphql); getline; getline; next }
          /<!-- RACE_PROGRESS -->/ { print; print block(race); getline; getline; next }
          /<!-- NOSQL_PROGRESS -->/ { print; print block(nosql); getline; getline; next }
          /<!-- API_PROGRESS -->/ { print; print block(api); getline; getline; next }
          /<!-- LLM_PROGRESS -->/ { print; print block(llm); getline; getline; next }
          /<!-- CACHEDEC_PROGRESS -->/ { print; print block(cachedec); getline; getline; next }

          {print}

          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update progress" || echo "no change"
          git push
