name: Auto Progress

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  progress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Calculate progress
        id: calc
        run: |

          make_bar () {
            percent=$1
            filled=$((percent / 5))
            empty=$((20 - filled))
            bar=$(printf "%0.s█" $(seq 1 $filled))
            space=$(printf "%0.s░" $(seq 1 $empty))
            echo "$bar$space"
          }

          calc_section () {
            start=$1
            end=$2

            section=$(awk "/$start/,/$end/" README.md)

            total=$(echo "$section" | grep -o "\- \[[ x]\]" | wc -l)
            done=$(echo "$section" | grep -o "\- \[x\]" | wc -l)

            if [ "$total" -eq 0 ]; then
              percent=0
            else
              percent=$((done * 100 / total))
            fi

            bar=$(make_bar $percent)

            echo "$done|$total|$percent|$bar"
          }

          # overall
          total=$(grep -o "\- \[[ x]\]" README.md | wc -l)
          done=$(grep -o "\- \[x\]" README.md | wc -l)

          percent=$((done * 100 / total))
          bar=$(make_bar $percent)

          echo "OVERALL=$done|$total|$percent|$bar" >> $GITHUB_OUTPUT

          # modules
          echo "SQL=$(calc_section '<!-- SQL_START -->' '<!-- SQL_END -->')" >> $GITHUB_OUTPUT
          echo "NOSQL=$(calc_section '<!-- NOSQL_START -->' '<!-- NOSQL_END -->')" >> $GITHUB_OUTPUT
          echo "XSS=$(calc_section '<!-- XSS_START -->' '<!-- XSS_END -->')" >> $GITHUB_OUTPUT
          echo "AUTH=$(calc_section '<!-- AUTH_START -->' '<!-- AUTH_END -->')" >> $GITHUB_OUTPUT

      - name: Update README
        run: |

          overall="${{ steps.calc.outputs.OVERALL }}"
          sql="${{ steps.calc.outputs.SQL }}"
          nosql="${{ steps.calc.outputs.NOSQL }}"
          xss="${{ steps.calc.outputs.XSS }}"
          auth="${{ steps.calc.outputs.AUTH }}"

          awk -v overall="$overall" \
              -v sql="$sql" \
              -v nosql="$nosql" \
              -v xss="$xss" \
              -v auth="$auth" '

          function print_block(name,data){
            split(data,a,"|")
            print name ": " a[1] "/" a[2] " (" a[3] "%)"
            print a[4]
            print ""
          }

          BEGIN{
            split(overall,o,"|")
          }

          /<!-- PROGRESS_START -->/ {
            print
            print "Overall: " o[1] "/" o[2] " (" o[3] "%)"
            print o[4]
            print ""

            print_block("SQL Injection", sql)
            print_block("NoSQL Injection", nosql)
            print_block("XSS", xss)
            print_block("Authentication", auth)

            skip=1
            next
          }

          /<!-- PROGRESS_END -->/ { skip=0 }
          !skip
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update progress" || echo "no change"
          git push
